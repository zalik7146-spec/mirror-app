<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#2c2416"/>
  <rect x="40" y="40" width="432" height="432" rx="60" fill="#3d3020"/>
  <!-- Рама зеркала -->
  <ellipse cx="256" cy="240" rx="140" ry="170" fill="none" stroke="#c8922a" stroke-width="12"/>
  <ellipse cx="256" cy="240" rx="128" ry="158" fill="#1a1508"/>
  <!-- Блик -->
  <ellipse cx="256" cy="240" rx="128" ry="158" fill="url(#mirrorGrad)"/>
  <!-- Ручка -->
  <rect x="236" y="408" width="40" height="50" rx="8" fill="#c8922a"/>
  <rect x="226" y="450" width="60" height="12" rx="6" fill="#a87820"/>
  <!-- Отражение — мягкий свет -->
  <ellipse cx="230" cy="180" rx="30" ry="50" fill="rgba(255,255,255,0.06)" transform="rotate(-20 230 180)"/>
  <defs>
    <radialGradient id="mirrorGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#3d3020"/>
      <stop offset="60%" stop-color="#1a1508"/>
      <stop offset="100%" stop-color="#0d0a04"/>
    </radialGradient>
  </defs>
  <!-- Золотые украшения рамы -->
  <ellipse cx="256" cy="72" rx="12" ry="12" fill="#c8922a"/>
  <ellipse cx="256" cy="408" rx="10" ry="10" fill="#c8922a"/>
  <ellipse cx="116" cy="240" rx="10" ry="10" fill="#c8922a"/>
  <ellipse cx="396" cy="240" rx="10" ry="10" fill="#c8922a"/>
</svg>
